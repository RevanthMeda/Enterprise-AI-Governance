<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI CONTROL GRID by ACTURUS API Docs - Enterprise Identity</title>
    <style>
      :root {
        color-scheme: light;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --surface: rgba(255, 255, 255, 0.94);
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.12);
      }
      body { margin: 0; background: #ffffff; color: var(--text); font-family: Inter, system-ui, sans-serif; }
      .site-header {
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        backdrop-filter: blur(10px);
      }
      .site-header-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
      }
      .brand-badge {
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--accent-soft);
        color: var(--accent);
      }
      .brand-copy {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .brand-copy small {
        color: var(--muted);
        font-size: 11px;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
      }
      .nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      .nav a:hover {
        color: var(--text);
      }
      .nav .cta {
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
      }
      #redoc-root { min-height: calc(100vh - 73px); }
      .redoc-error {
        display: none;
        max-width: 720px;
        margin: 48px auto;
        padding: 20px;
        border: 1px solid #fecaca;
        border-radius: 12px;
        background: #fff1f2;
        color: #9f1239;
        font: 14px/1.5 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="/welcome">
          <span class="brand-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
              <path d="M12 2.8 19.2 6.9v8.2L12 19.2l-7.2-4.1V6.9L12 2.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
              <circle cx="12" cy="11" r="3.2" stroke="currentColor" stroke-width="1.5" opacity="0.9" />
              <path d="M12 7.7v6.6M8.7 11h6.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.95" />
              <circle cx="17.7" cy="6.3" r="1.6" fill="currentColor" opacity="0.7" />
            </svg>
          </span>
          <span class="brand-copy">
            <span>AI CONTROL GRID</span>
            <small>Developed by ACTURUS</small>
          </span>
        </a>
        <nav class="nav">
          <a href="/welcome#product">Product</a>
          <a href="/welcome#solutions">Solutions</a>
          <a href="/welcome#frameworks">Frameworks</a>
          <a href="/welcome#how-it-works">How it Works</a>
          <a href="/welcome#pricing">Pricing</a>
          <a href="/welcome#faq">FAQ</a>
          <a href="/trust-center">Trust Center</a>
          <a href="/api-docs">Docs</a>
          <a href="/auth/login">Sign In</a>
          <a class="cta" href="/book-demo">Book a Demo</a>
        </nav>
      </div>
    </header>
    <div id="redoc-root"></div>
    <div id="redoc-error" class="redoc-error">
      API docs failed to load. Check that the Redoc bundle and YAML spec are reachable.
    </div>
    <script src="https://cdn.jsdelivr.net/npm/redoc@2/bundles/redoc.standalone.js"></script>
    <script>
      if (window.Redoc) {
        window.Redoc.init("/api-docs/identity.yaml", { scrollYOffset: 16 }, document.getElementById("redoc-root"));
      } else {
        document.getElementById("redoc-error").style.display = "block";
      }
    </script>
  </body>
</html>
