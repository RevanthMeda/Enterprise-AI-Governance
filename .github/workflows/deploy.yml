name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    name: Validate tenant + regression + build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_ai_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_ai_governance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/enterprise_ai_governance
      NODE_ENV: test
      SESSION_SECRET: ci-session-secret
      TRUST_PROXY: "false"
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAME_SITE: lax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: npm run db:push -- --force

      - name: Run type checks
        run: npm run check

      - name: Lint OpenAPI specs
        run: npm run openapi:lint

      - name: Validate tenant integrity
        run: npm run tenant:validate

      - name: Run static tenant guard
        run: npm run tenant:guard

      - name: Run tenant isolation tests
        run: npm run test:tenant:isolation

      - name: Run tenant route tests
        run: npm run test:tenant:routes

      - name: Run CSRF security tests
        run: npm run test:security:csrf-middleware && npm run test:security:csrf-client && npm run test:security:http-headers && npm run test:security:csrf

      - name: Run regression suite
        run: npm run test:regression:all

      - name: Validate Firebase preview build
        run: npm run build:firebase

      - name: Upload Firebase hosting artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase-public
          path: dist/public
          retention-days: 1

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    name: Trigger production deploys
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deployment dependencies
        run: npm ci

      - name: Download Firebase hosting artifact
        uses: actions/download-artifact@v4
        with:
          name: firebase-public
          path: dist/public

      - name: Validate production deployment configuration
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          PRODUCTION_FRONTEND_TOPOLOGY: ${{ vars.PRODUCTION_FRONTEND_TOPOLOGY }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          test -n "$DATABASE_URL"
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          test -n "$PRODUCTION_FRONTEND_URL"
          test -n "$PRODUCTION_BACKEND_URL"
          test -n "$PRODUCTION_FRONTEND_TOPOLOGY"
          test -n "$SMOKE_ADMIN_USERNAME"
          test -n "$SMOKE_ADMIN_PASSWORD"

      - name: Apply production schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:push -- --force

      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase Hosting
        run: npx --yes firebase-tools@15.23.0 deploy --only hosting --project ai-control-tower-d9854 --non-interactive

      - name: Trigger Netlify build hook
        if: ${{ secrets.NETLIFY_BUILD_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.NETLIFY_BUILD_HOOK_URL }}"

      - name: Wait for deploy propagation
        run: sleep 90

      - name: Run production smoke checks
        env:
          SMOKE_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          SMOKE_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_FRONTEND_TOPOLOGY: ${{ vars.PRODUCTION_FRONTEND_TOPOLOGY }}
          SMOKE_RETRIES: "18"
          SMOKE_DELAY_MS: "10000"
        run: npm run smoke:deploy

      - name: Deployment hook summary
        run: |
          echo "Render deploy triggered: true"
          echo "Firebase Hosting deployed: true"
          echo "Netlify build hook configured: ${{ secrets.NETLIFY_BUILD_HOOK_URL != '' }}"
