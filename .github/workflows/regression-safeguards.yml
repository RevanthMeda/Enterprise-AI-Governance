name: Regression Safeguards

on:
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    name: Regression + Golden Seed
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_ai_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_ai_governance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/enterprise_ai_governance
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply schema
        run: npm run db:push -- --force

      - name: Run regression suite
        run: npm run test:regression:all

      - name: Run golden heavy seed
        run: npm run seed:heavy:golden

