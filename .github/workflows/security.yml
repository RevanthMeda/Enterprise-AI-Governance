name: Security

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  security:
    name: Security Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: npm run security:sast

      - name: OpenAPI lint
        run: npm run openapi:lint

      - name: CSP header smoke test
        run: npm run test:security:csp

      - name: Dependency audit
        run: npm run security:deps

      - name: Secret scan
        run: npm run security:secrets

      - name: Generate SBOM
        run: npm run security:sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/owasp-top-ten
            p/nodejs
            p/secrets
