name: Promote Production Release

on:
  workflow_dispatch:

jobs:
  promote:
    name: Promote validated main to production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: enterprise_ai_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enterprise_ai_governance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/enterprise_ai_governance
      NODE_ENV: test
      SESSION_SECRET: ci-session-secret
      TRUST_PROXY: "false"
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAME_SITE: lax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release schema and tests
        run: |
          npm run db:push
          npm run security:sast
          npm run security:deps
          npm run security:secrets
          npm run tenant:validate
          npm run test:tenant:isolation
          npm run test:tenant:routes
          npm run test:security:csrf
          npm run test:regression:all

      - name: Build Firebase Hosting release
        run: npm run build:firebase

      - name: Reject a stale production release
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"

      - name: Validate production deployment configuration
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          PRODUCTION_FRONTEND_TOPOLOGY: ${{ vars.PRODUCTION_FRONTEND_TOPOLOGY }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          PRODUCTION_DB_BACKUP_CONFIRMED: ${{ vars.PRODUCTION_DB_BACKUP_CONFIRMED }}
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
          test -n "$DATABASE_URL"
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          test -n "$PRODUCTION_FRONTEND_URL"
          test -n "$PRODUCTION_BACKEND_URL"
          test -n "$PRODUCTION_FRONTEND_TOPOLOGY"
          test -n "$SMOKE_ADMIN_USERNAME"
          test -n "$SMOKE_ADMIN_PASSWORD"
          test "$PRODUCTION_DB_BACKUP_CONFIRMED" = "$GITHUB_SHA"

      - name: Apply forward-compatible production schema expansion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRODUCTION_DB_BACKUP_CONFIRMED: ${{ vars.PRODUCTION_DB_BACKUP_CONFIRMED }}
        run: npm run db:migrate:production

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsSL --retry 3 --retry-all-errors -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for the new Render release to be ready
        env:
          SMOKE_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          SMOKE_EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          SMOKE_RETRIES: "60"
          SMOKE_DELAY_MS: "10000"
        run: npm run smoke:deploy

      - name: Protect legacy organization invite tokens
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate:invite-token-digests

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase Hosting
        run: npx --yes firebase-tools@15.23.0 deploy --only hosting --project ai-control-tower-d9854 --non-interactive

      - name: Trigger Netlify build hook
        id: netlify
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsSL --retry 3 --retry-all-errors -X POST "$NETLIFY_BUILD_HOOK_URL"
          echo "triggered=true" >> "$GITHUB_OUTPUT"

      - name: Run production smoke checks
        env:
          SMOKE_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          SMOKE_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          SMOKE_ADMIN_USERNAME: ${{ secrets.SMOKE_ADMIN_USERNAME }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_FRONTEND_TOPOLOGY: ${{ vars.PRODUCTION_FRONTEND_TOPOLOGY }}
          SMOKE_EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          SMOKE_RETRIES: "18"
          SMOKE_DELAY_MS: "10000"
        run: npm run smoke:deploy
